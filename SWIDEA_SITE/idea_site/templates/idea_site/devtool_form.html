{% extends 'idea_site/base.html' %}

{% block content %}
<section class="dev-form-title">
    {% if devtool %}
    <h1>DevTool Detail Update</h1>
    <p>개발툴 수정사항 페이지입니다. 개발툴 수정사항이 있다면 고쳐보세요.</p>
    {% else %}
    <h1>DevTool Register</h1>
    <p>개발툴 등록 페이지입니다. 자신이 다룰 수 있는 개발툴을 등록해 보아요.</p>
    {% endif %}
</section>


<form method="post" class="dev-form">
    {% csrf_token %}
    {{ form.as_p }}

    <div class="form-actions">
        <button type="submit">SUBMIT</button>
    </div>

</form>
{% endblock %}
