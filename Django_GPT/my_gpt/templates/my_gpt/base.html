{% load static %}
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Django GPT{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'my_gpt/css/style.css' %}">
</head>
<body>
  <header>
    <nav class="nav" aria-label="주요 메뉴">
      <a class="brand" href="{% url 'my_gpt:sentiment' %}">Django GPT</a>
      <a class="nav-link {% if active_tab == 'sentiment' %}active{% endif %}" href="{% url 'my_gpt:sentiment' %}">감정 분석</a>
      <a class="nav-link {% if active_tab == 'summarize' %}active{% endif %}" href="{% url 'my_gpt:summarize' %}">문서 요약</a>
      <a class="nav-link {% if active_tab == 'moderate' %}active{% endif %}" href="{% url 'my_gpt:moderate' %}">유해 표현 분석</a>
      <span class="spacer"></span>
      {% if user.is_authenticated %}
        <span>{{ user.username }}님</span>
        <form action="{% url 'logout' %}" method="post">
          {% csrf_token %}
          <button class="link-button" type="submit">로그아웃</button>
        </form>
      {% else %}
        <a href="{% url 'login' %}">로그인</a>
      {% endif %}
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script src="{% static 'my_gpt/js/common.js' %}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
